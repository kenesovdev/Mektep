version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - media_files:/app/media/
      - static_files:/app/staticfiles/
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    # ─── FIX: было --workers 3 → теперь 1 воркер + 4 потока ──────────────────
    # 3 воркера × ~150MB RAM = 450MB+ → OOM на Render Free (лимит 512MB)
    # 1 воркер + 4 потока = ~180MB total, при этом 4 параллельных запроса
    # --max-requests 500 перезапускает воркер каждые 500 запросов
    # (защита от медленных утечек памяти)
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn teacher_portfolio.wsgi:application
               --bind 0.0.0.0:8000
               --workers 1
               --threads 4
               --timeout 120
               --max-requests 500
               --max-requests-jitter 50"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    volumes:
      - frontend_build:/app/dist
    command: sh -c "cp -r /dist/. /app/dist/ && tail -f /dev/null"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - media_files:/media/:ro
      - static_files:/static/:ro
      - frontend_build:/usr/share/nginx/html/:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
  static_files:
  frontend_build:
